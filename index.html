<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Framing Demo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

/* ===== HERO ===== */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;

  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
  background-size: cover;
  background-position: center;
}

.hero h1 {
  font-size: 3rem;
  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 1s ease forwards;
}

.hero p {
  opacity: 0;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.3s;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: #f4c542;
  color: black;
  border: none;
  cursor: pointer;
  transition: 0.3s;
  font-weight: bold;
}

.btn:hover {
  transform: scale(1.1);
}

/* ===== SLIDER ===== */
.slider {
  overflow: hidden;
}

.slides {
  display: flex;
  width: 300%;
  animation: slide 12s infinite;
}

.slides img {
  width: 100%;
  height: 420px;
  object-fit: cover;
}

/* 滑动动画 */
@keyframes slide {
  0%,30% { transform: translateX(0); }
  35%,65% { transform: translateX(-100%); }
  70%,100% { transform: translateX(-200%); }
}

/* ===== SECTION ===== */
.section {
  padding: 80px 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 30px;
}

/* ===== CARDS ===== */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  margin: 15px;
  padding: 20px;
  width: 260px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* ===== 滚动动画 ===== */
.hidden {
  opacity: 0;
  transform: translateY(50px);
}

.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.6s ease;
}

/* ===== fade ===== */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 手机适配 */
@media(max-width:768px){
  .slides img {
    height: 250px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Framing Demo</h1>
  <p>Professional Wood Framing Services</p>
  <button class="btn">Get a Quote</button>
</div>

<!-- PROJECTS -->
<div class="section">
  <h2 class="hidden">Projects</h2>

  <div class="slider hidden">
    <div class="slides">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
      <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd">
      <img src="https://images.unsplash.com/photo-1599423300746-b62533397364">
    </div>
  </div>
</div>

<!-- SERVICES -->
<div class="section">
  <h2 class="hidden">Our Services</h2>

  <div class="cards">
    <div class="card hidden">House Framing</div>
    <div class="card hidden">Basement Framing</div>
    <div class="card hidden">Garage Framing</div>
  </div>
</div>

<!-- ABOUT -->
<div class="section">
  <h2 class="hidden">Why Choose Us</h2>
  <p class="hidden">Fast, Reliable, Professional Craftsmanship.</p>
</div>

<!-- CONTACT -->
<div class="section">
  <h2 class="hidden">Contact Us</h2>
  <button class="btn hidden">Call Now</button>
</div>

<script>
// 滚动动画
setTimeout(() => {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
      }
    });
  });

  document.querySelectorAll(".hidden").forEach(el => {
    observer.observe(el);
  });
}, 200);
</script>

</body>
</html>
